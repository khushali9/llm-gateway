apiVersion: v1
kind: Service
metadata:
  name: vllm-fast-nodeport
spec:
  type: NodePort
  selector:
    app: vllm-fast
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800     # INT4 → host:30800
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-large-nodeport
spec:
  type: NodePort
  selector:
    app: vllm-large
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30801     # FP16 → host:30801
